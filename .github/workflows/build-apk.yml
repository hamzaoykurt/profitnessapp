name: Android CI/CD Build & Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Keystore signing is handled explicitly in build.gradle.kts via local.properties.

      - name: Validate Gradle Wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
          
      - name: Get Next Version
        id: version
        run: |
          COUNT=$(gh release list --limit 1000 --json tagName \
            --jq '[.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+$"))] | length')
          NEXT=$((COUNT + 1))
          MAJOR=$((NEXT / 10))
          MINOR=$((NEXT % 10))
          TAG="v$MAJOR.$MINOR"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "apk_name=Profitness_$TAG.apk" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject credentials into local.properties
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"              >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"    >> local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}"              >> local.properties
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"          >> local.properties
          echo "KEYSTORE_BASE64=${{ secrets.DEBUG_KEYSTORE_BASE64 }}"  >> local.properties
          echo "KEYSTORE_PASSWORD=android"                              >> local.properties
          echo "KEY_ALIAS=androiddebugkey"                              >> local.properties
          echo "KEY_PASSWORD=android"                                   >> local.properties

      - name: Verify Android signing certificate
        id: signing
        shell: bash
        run: |
          if [ -z "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
            echo "::error::DEBUG_KEYSTORE_BASE64 secret is missing. Without a fixed keystore, GitHub APKs can be signed with a different certificate and Google Places API restrictions will block them."
            exit 1
          fi

          mkdir -p build
          printf '%s' "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > build/ci_signing.keystore

          SHA1=$(keytool -list -v \
            -keystore build/ci_signing.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android 2>/dev/null | awk -F': ' '/SHA1:/{print $2; exit}')

          SHA256=$(keytool -list -v \
            -keystore build/ci_signing.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android 2>/dev/null | awk -F': ' '/SHA256:/{print $2; exit}')

          if [ -z "$SHA1" ]; then
            echo "::error::Could not read SHA-1 from DEBUG_KEYSTORE_BASE64. Check keystore password, key alias, and key password."
            exit 1
          fi

          echo "sha1=$SHA1" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Android signing SHA-1: $SHA1"
          echo "Android signing SHA-256: $SHA256"
          echo "::notice title=Android signing SHA-1::$SHA1"

      - name: Grant Gradlew Permission
        run: chmod +x gradlew

      - name: Build Debug Artifact
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.parallel=true --no-configuration-cache --no-build-cache

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             "app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}"

      - name: Create Versioned Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Profitness ${{ steps.version.outputs.tag }}"
          body: |
            ### ${{ steps.version.outputs.tag }}
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Timestamp:** ${{ github.event.head_commit.timestamp }}
            - **Android signing SHA-1:** `${{ steps.signing.outputs.sha1 }}`

            If Google Places shows API 9011 on this APK, add the SHA-1 above to the Google Cloud API key restriction for package `com.avonix.profitness`.

            ${{ github.event.head_commit.message }}
          files: "app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
