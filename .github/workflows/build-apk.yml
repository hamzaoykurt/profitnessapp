name: Android CI/CD Release

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Also publish a versioned GitHub Release"
        required: false
        default: false
        type: boolean

jobs:
  release:
    name: Build Release AAB
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Keystore signing is handled explicitly in build.gradle.kts via local.properties.

      - name: Validate Gradle Wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
          
      - name: Get Next Version
        id: version
        run: |
          COUNT=$(gh release list --limit 1000 --json tagName \
            --jq '[.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+$"))] | length')
          NEXT=$((COUNT + 1))
          MAJOR=$((NEXT / 10))
          MINOR=$((NEXT % 10))
          TAG="v$MAJOR.$MINOR"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "aab_name=Profitness_$TAG.aab" >> $GITHUB_OUTPUT
          echo "apk_name=Profitness_${TAG}_internal-test.apk" >> $GITHUB_OUTPUT
          echo "mapping_name=Profitness_$TAG-mapping.txt" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject public build configuration
        env:
          RESET_PASSWORD_LINK_HOST: ${{ vars.RESET_PASSWORD_LINK_HOST || secrets.RESET_PASSWORD_LINK_HOST }}
          RESET_PASSWORD_REDIRECT_URL: ${{ vars.RESET_PASSWORD_REDIRECT_URL || secrets.RESET_PASSWORD_REDIRECT_URL }}
        run: |
          RESET_PASSWORD_LINK_HOST="${RESET_PASSWORD_LINK_HOST:-cosmibit.com}"
          RESET_PASSWORD_REDIRECT_URL="${RESET_PASSWORD_REDIRECT_URL:-profitness://reset-password}"
          if [ -z "$RESET_PASSWORD_LINK_HOST" ] || [ -z "$RESET_PASSWORD_REDIRECT_URL" ]; then
            echo "::error::Reset password link configuration could not be resolved."
            exit 1
          fi
          if [ "$RESET_PASSWORD_REDIRECT_URL" = "profitness://reset-password" ]; then
            echo "::warning::Using legacy password reset redirect. Publish assetlinks.json and set RESET_PASSWORD_REDIRECT_URL to enable verified Android App Links."
          fi
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"              >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"    >> local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}"              >> local.properties
          echo "RESET_PASSWORD_LINK_HOST=$RESET_PASSWORD_LINK_HOST"     >> local.properties
          echo "RESET_PASSWORD_REDIRECT_URL=$RESET_PASSWORD_REDIRECT_URL" >> local.properties

      - name: Verify release signing certificate
        id: signing
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          normalize_text_secret() {
            printf '%s' "$1" | python3 -c 'import sys; print(sys.stdin.read().strip(), end="")'
          }

          RELEASE_KEYSTORE_BASE64="$(printf '%s' "$RELEASE_KEYSTORE_BASE64" | tr -d '[:space:]')"
          RELEASE_KEYSTORE_PASSWORD="$(normalize_text_secret "$RELEASE_KEYSTORE_PASSWORD")"
          RELEASE_KEY_ALIAS="$(normalize_text_secret "$RELEASE_KEY_ALIAS")"
          RELEASE_KEY_PASSWORD="$(normalize_text_secret "$RELEASE_KEY_PASSWORD")"

          if [ -z "$RELEASE_KEYSTORE_BASE64" ] || [ -z "$RELEASE_KEYSTORE_PASSWORD" ] || [ -z "$RELEASE_KEY_ALIAS" ] || [ -z "$RELEASE_KEY_PASSWORD" ]; then
            echo "::error::Release signing secrets are required: RELEASE_KEYSTORE_BASE64, RELEASE_KEYSTORE_PASSWORD, RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD."
            exit 1
          fi

          mkdir -p build
          if ! printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > build/release_signing.keystore; then
            echo "::error::RELEASE_KEYSTORE_BASE64 is not valid base64. Copy the full contents of the generated .base64.txt file, not the file path."
            exit 1
          fi

          KEYTOOL_OUTPUT=$(keytool -list -v \
            -keystore build/release_signing.keystore \
            -alias "$RELEASE_KEY_ALIAS" \
            -storepass "$RELEASE_KEYSTORE_PASSWORD" \
            -keypass "$RELEASE_KEY_PASSWORD" 2>&1) || {
              echo "::error::Could not read release keystore. Check keystore password, key alias, and key password."
              keytool -list -v -keystore build/release_signing.keystore -storepass "$RELEASE_KEYSTORE_PASSWORD" 2>/dev/null | sed -n 's/^Alias name: /Available alias: /p' || true
              exit 1
            }

          SHA1=$(printf '%s\n' "$KEYTOOL_OUTPUT" | awk -F': ' '/SHA1:/{print $2; exit}')
          SHA256=$(printf '%s\n' "$KEYTOOL_OUTPUT" | awk -F': ' '/SHA256:/{print $2; exit}')

          if [ -z "$SHA1" ]; then
            echo "::error::Could not read SHA-1 from release keystore. Check keystore password, key alias, and key password."
            exit 1
          fi

          echo "sha1=$SHA1" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Android signing SHA-1: $SHA1"
          echo "Android signing SHA-256: $SHA256"
          echo "::notice title=Android signing SHA-1::$SHA1"

      - name: Grant Gradlew Permission
        run: chmod +x gradlew

      - name: Build Release Bundle
        env:
          RAW_RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RAW_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RAW_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RAW_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          normalize_text_secret() {
            printf '%s' "$1" | python3 -c 'import sys; print(sys.stdin.read().strip(), end="")'
          }
          export RELEASE_KEYSTORE_BASE64="$(printf '%s' "$RAW_RELEASE_KEYSTORE_BASE64" | tr -d '[:space:]')"
          export RELEASE_KEYSTORE_PASSWORD="$(normalize_text_secret "$RAW_RELEASE_KEYSTORE_PASSWORD")"
          export RELEASE_KEY_ALIAS="$(normalize_text_secret "$RAW_RELEASE_KEY_ALIAS")"
          export RELEASE_KEY_PASSWORD="$(normalize_text_secret "$RAW_RELEASE_KEY_PASSWORD")"
          ./gradlew :app:bundleRelease --no-daemon -Dorg.gradle.parallel=true --no-configuration-cache --no-build-cache

      - name: Build internal test APK
        env:
          RAW_RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RAW_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RAW_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RAW_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          normalize_text_secret() {
            printf '%s' "$1" | python3 -c 'import sys; print(sys.stdin.read().strip(), end="")'
          }
          export RELEASE_KEYSTORE_BASE64="$(printf '%s' "$RAW_RELEASE_KEYSTORE_BASE64" | tr -d '[:space:]')"
          export RELEASE_KEYSTORE_PASSWORD="$(normalize_text_secret "$RAW_RELEASE_KEYSTORE_PASSWORD")"
          export RELEASE_KEY_ALIAS="$(normalize_text_secret "$RAW_RELEASE_KEY_ALIAS")"
          export RELEASE_KEY_PASSWORD="$(normalize_text_secret "$RAW_RELEASE_KEY_PASSWORD")"
          ./gradlew :app:assembleRelease --no-daemon -Dorg.gradle.parallel=true --no-configuration-cache --no-build-cache

      - name: Rename release artifacts
        run: |
          mkdir -p release
          cp app/build/outputs/bundle/release/app-release.aab "release/${{ steps.version.outputs.aab_name }}"
          cp app/build/outputs/mapping/release/mapping.txt "release/${{ steps.version.outputs.mapping_name }}"
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk "release/${{ steps.version.outputs.apk_name }}"
          fi

      - name: Upload internal test APK
        uses: actions/upload-artifact@v4
        with:
          name: profitness-internal-test-apk
          path: release/${{ steps.version.outputs.apk_name }}
          if-no-files-found: error
          retention-days: 14

      - name: Create Versioned Release
        if: github.event_name == 'push' || inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Profitness ${{ steps.version.outputs.tag }}"
          body: |
            ### ${{ steps.version.outputs.tag }}
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Timestamp:** ${{ github.event.head_commit.timestamp }}
            - **Release signing SHA-1:** `${{ steps.signing.outputs.sha1 }}`

            Use the SHA-256 fingerprint from this workflow when publishing the Android App Links `assetlinks.json` file for the reset-password domain.

            ${{ github.event.head_commit.message }}
          files: |
            release/${{ steps.version.outputs.aab_name }}
            release/${{ steps.version.outputs.mapping_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
