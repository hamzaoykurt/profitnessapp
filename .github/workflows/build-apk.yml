name: Android CI/CD Build & Release

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - '**.gradle*'
      - 'gradle/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle Configuration
        uses: actions/cache@v4
        with:
          path: .gradle
          key: ${{ runner.os }}-gradle-conf-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-conf-

      - name: Validate Gradle Wrapper
        uses: gradle/actions/setup-gradle@v3

      - name: Get Next Version
        id: version
        run: |
          COUNT=$(gh release list --limit 1000 --json tagName \
            --jq '[.[] | select(.tagName | test("^v0\\.[0-9]+$"))] | length')
          NEXT=$((COUNT + 1))
          echo "number=$NEXT" >> $GITHUB_OUTPUT
          echo "tag=v0.$NEXT" >> $GITHUB_OUTPUT
          echo "apk_name=Profitness_v0.$NEXT.apk" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Debug Artifact
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.parallel=true

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             "app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}"

      - name: Create Versioned Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Profitness ${{ steps.version.outputs.tag }}"
          body: |
            ### ${{ steps.version.outputs.tag }}
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Timestamp:** ${{ github.event.head_commit.timestamp }}

            ${{ github.event.head_commit.message }}
          files: "app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
