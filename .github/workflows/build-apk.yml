name: Android CI/CD Build & Release

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - '**.gradle*'
      - 'gradle/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug Artifact
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.parallel=true

      - name: Update Continuous Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Development Build (Latest)"
          body: |
            ### Automated Build Information
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Timestamp:** ${{ github.event.head_commit.timestamp }}
            
            This release is automatically updated on every push.
          files: app/build/outputs/apk/debug/app-debug.apk
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
