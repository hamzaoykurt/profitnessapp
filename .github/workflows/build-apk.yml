name: Android CI/CD Build & Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Keystore signing is handled explicitly in build.gradle.kts via local.properties.

      - name: Validate Gradle Wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true
          
      - name: Get Next Version
        id: version
        run: |
          COUNT=$(gh release list --limit 1000 --json tagName \
            --jq '[.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+$"))] | length')
          NEXT=$((COUNT + 1))
          MAJOR=$((NEXT / 10))
          MINOR=$((NEXT % 10))
          TAG="v$MAJOR.$MINOR"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "apk_name=Profitness_$TAG.apk" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject credentials into local.properties
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"              >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}"    >> local.properties
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"          >> local.properties
          echo "KEYSTORE_BASE64=${{ secrets.RELEASE_KEYSTORE_BASE64 }}" >> local.properties
          echo "KEYSTORE_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> local.properties
          echo "KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}"             >> local.properties
          echo "KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}"       >> local.properties

      - name: Validate release signing secrets
        run: |
          test -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}"
          test -n "${{ secrets.RELEASE_KEYSTORE_PASSWORD }}"
          test -n "${{ secrets.RELEASE_KEY_ALIAS }}"
          test -n "${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Grant Gradlew Permission
        run: chmod +x gradlew

      - name: Build Release Artifact
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.parallel=true --no-configuration-cache --no-build-cache

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}"

      - name: Create Versioned Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Profitness ${{ steps.version.outputs.tag }}"
          body: |
            ### ${{ steps.version.outputs.tag }}
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Timestamp:** ${{ github.event.head_commit.timestamp }}

            ${{ github.event.head_commit.message }}
          files: "app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
