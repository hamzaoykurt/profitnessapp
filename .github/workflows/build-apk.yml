name: Android CI/CD Build & Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle Configuration
        uses: actions/cache@v4
        with:
          path: .gradle
          key: ${{ runner.os }}-gradle-conf-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-conf-

      # Restore a consistent debug keystore so every APK has the same signature.
      # Without this, Android refuses to update the installed app (signature mismatch).
      # To set this up: generate once locally, base64-encode, add as repository secret DEBUG_KEYSTORE_BASE64.
      #   keytool -genkeypair -keystore debug.keystore -alias androiddebugkey \
      #     -keyalg RSA -keysize 2048 -validity 10000 \
      #     -storepass android -keypass android \
      #     -dname "CN=Android Debug,O=Android,C=US"
      #   base64 -w0 debug.keystore   (Linux) or base64 -i debug.keystore (macOS)
      - name: Restore Debug Keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore
            echo "✓ Restored consistent debug keystore from secret"
          else
            echo "⚠ DEBUG_KEYSTORE_BASE64 secret not set — a fresh keystore will be generated."
            echo "  APK signatures will differ across builds; installed apps cannot be updated."
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -3
          fi

      - name: Validate Gradle Wrapper
        uses: gradle/actions/setup-gradle@v3

      - name: Get Next Version
        id: version
        run: |
          COUNT=$(gh release list --limit 1000 --json tagName \
            --jq '[.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+$"))] | length')
          NEXT=$((COUNT + 1))
          MAJOR=$((NEXT / 10))
          MINOR=$((NEXT % 10))
          TAG="v$MAJOR.$MINOR"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "apk_name=Profitness_$TAG.apk" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Debug Artifact
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.parallel=true

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             "app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}"

      - name: Create Versioned Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Profitness ${{ steps.version.outputs.tag }}"
          body: |
            ### ${{ steps.version.outputs.tag }}
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Timestamp:** ${{ github.event.head_commit.timestamp }}

            ${{ github.event.head_commit.message }}
          files: "app/build/outputs/apk/debug/${{ steps.version.outputs.apk_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
